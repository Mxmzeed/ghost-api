<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost API — Image Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
        }
        h1 span { color: #7c5cfc; font-weight: 600; }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        textarea {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid #2a2a40;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 1rem;
            padding: 1rem;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
            transition: border 0.2s;
        }
        textarea:focus { outline: none; border-color: #7c5cfc; }
        button {
            margin-top: 1rem;
            padding: 0.8rem 2.5rem;
            background: #7c5cfc;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #6a48e8; }
        button:active { transform: scale(0.97); }
        button:disabled {
            background: #3a3a5c;
            cursor: not-allowed;
        }
        .spinner {
            display: none;
            margin: 1.5rem auto;
            width: 40px;
            height: 40px;
            border: 4px solid #2a2a40;
            border-top-color: #7c5cfc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result {
            margin-top: 1.5rem;
            display: none;
        }
        .result img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(124,92,252,0.2);
        }
        .error {
            margin-top: 1rem;
            color: #ff6b6b;
            font-size: 0.9rem;
            display: none;
        }
        .footer {
            margin-top: 2rem;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ghost <span>api</span></h1>
        <p class="subtitle">turn text into images with AI</p>

        <div class="card">
            <textarea id="prompt" placeholder="Describe the image you want..."></textarea>
            <button id="generateBtn">Generate</button>
            <div class="spinner" id="spinner"></div>
            <div class="result" id="result">
                <img id="image" alt="Generated image" />
            </div>
            <div class="error" id="error"></div>
        </div>

        <p class="footer">powered by OpenAI DALL-E 3</p>
    </div>

    <script>
        const promptEl = document.getElementById('prompt');
        const btn = document.getElementById('generateBtn');
        const spinner = document.getElementById('spinner');
        const result = document.getElementById('result');
        const image = document.getElementById('image');
        const error = document.getElementById('error');

        btn.addEventListener('click', async () => {
            const prompt = promptEl.value.trim();
            if (!prompt) return;

            btn.disabled = true;
            spinner.style.display = 'block';
            result.style.display = 'none';
            error.style.display = 'none';

            try {
                const res = await fetch('/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Something went wrong');

                image.src = data.url;
                result.style.display = 'block';
            } catch (e) {
                error.textContent = e.message;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
